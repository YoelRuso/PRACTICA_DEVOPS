name: CI

on:
  push:
    branches: ["**"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true # Esto hará que tus tests vuelen en el segundo push

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        # 'uv sync' instala todo lo necesario definido en tu pyproject.toml
        run: uv sync

      - name: Ruff format
        run: uv run ruff format --check

      - name: Ruff linter
        run: uv run ruff check

      - name: Mypy
        # Asegúrate de tener 'mypy' en tu grupo de dev-dependencies
        run: uv run mypy .

      - name: Unit tests
        run: uv run pytest core/tests/unit

      - name: Integration tests
        run: uv run pytest core/tests/integration

      - name: BDD tests
        run: uv run pytest core/tests/behaviour